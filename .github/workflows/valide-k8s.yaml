---
name: Validation des fichiers Kubernetes

# Se déclenche à chaque fois que tu pousses du code ou fais une Pull Request
"on":
  push:
    branches: ["main", "master", "develop"]
  pull_request:
    branches: ["main", "master", "develop"]

jobs:
  validate-yaml:
    name: Vérification YAML & Kubernetes
    runs-on: ubuntu-latest

    steps:
      # 1. Récupère le code de ton dépôt
      - name: Checkout du code
        uses: actions/checkout@v4

      # 2. Vérifie la syntaxe YAML de base
      - name: YAML Lint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: .

      # 3. Vérifie la validité pour Kubernetes 1.34.6
      - name: Validation Kubernetes (Kubeconform)
        uses: docker://ghcr.io/yannh/kubeconform:latest
        with:
          summary: true
          kubernetes-version: "1.34.6"
          ignore-missing-schemas: true

      - name: Scan de sécurité Kubernetes (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          hide-progress: false
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
