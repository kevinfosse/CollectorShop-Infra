# =============================================================================
# Configuration NGINX pour Angular (Port 8080 + Routage SPA)
# Indispensable pour éviter que NGINX ne tente de bind le port 80 (interdit sans root)
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-front-conf
  namespace: collectorshop
data:
  default.conf: |
    server {
        listen 8080;
        server_name _;

        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
            # Crucial pour Angular : redirige toutes les requêtes vers index.html
            try_files $uri $uri/ /index.html; 
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }

---
# =============================================================================
# Frontend Angular — Application web servie par Nginx
# Strictement aligné sur les exigences de Trivy (NonRoot, ReadOnly, Drop ALL)
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: collectorshop-front
  namespace: collectorshop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: collectorshop-front
  template:
    metadata:
      labels:
        app: collectorshop-front
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: ghcr-regcred
      containers:
        - name: collectorshop-front
          image: ghcr.io/kevinfosse/collectorshop-front:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: tmp
              mountPath: /tmp
            # On monte notre configuration personnalisée
            - name: nginx-config-vol
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: tmp
          emptyDir: {}
        - name: nginx-config-vol
          configMap:
            name: nginx-front-conf

---
apiVersion: v1
kind: Service
metadata:
  name: collectorshop-front
  namespace: collectorshop
spec:
  selector:
    app: collectorshop-front
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: collectorshop-front
  namespace: collectorshop
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - collectorcube.duckdns.org
      secretName: collectorshop-front-tls
  rules:
    - host: collectorcube.duckdns.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: collectorshop-front
                port:
                  number: 80