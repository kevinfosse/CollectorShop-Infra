# =============================================================================
# Frontend Angular — Application web servie par Nginx
# 1 replica suffit (contenu statique, très léger)
# Ingress Traefik avec TLS pour collectorcube.duckdns.org
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: collectorshop-front
  namespace: collectorshop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: collectorshop-front
  template:
    metadata:
      labels:
        app: collectorshop-front
    spec:
      imagePullSecrets:
        - name: ghcr-regcred
      containers:
        - name: collectorshop-front
          image: ghcr.io/kevinfosse/collectorshop-front:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: collectorshop-front
  namespace: collectorshop
spec:
  selector:
    app: collectorshop-front
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: collectorshop-front
  namespace: collectorshop
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - collectorcube.duckdns.org
      secretName: collectorshop-front-tls
  rules:
    - host: collectorcube.duckdns.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: collectorshop-front
                port:
                  number: 80
