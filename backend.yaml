apiVersion: apps/v1
kind: Deployment
metadata:
  name: collectorshop-back
  namespace: collectorshop
spec:
  replicas: 2
  selector:
    matchLabels:
      app: collectorshop-back
  template:
    metadata:
      labels:
        app: collectorshop-back
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      imagePullSecrets:
        - name: ghcr-regcred
      containers:
        - name: collectorshop-back
          image: ghcr.io/kevinfosse/collectorshop-back:latest
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
            - name: MSSQL_SA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mssql-secret
                  key: sa-password
            
            - name: ConnectionStrings__DefaultConnection
              value: "Server=mssql;Database=CollectorShop;User Id=sa;Password=$(MSSQL_SA_PASSWORD);TrustServerCertificate=True"
            
            - name: RabbitMQ__Host
              value: "rabbitmq"
            - name: RabbitMQ__Username
              value: "collector"
            - name: RabbitMQ__Password
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: password
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20 # Laissé un peu de temps au démarrage .NET
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 10
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: collectorshop-back
  namespace: collectorshop
spec:
  selector:
    app: collectorshop-back
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
