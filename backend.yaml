---
# =============================================================================
# Backend .NET 10 — API Principale CollectorShop
# Connecté à MSSQL et RabbitMQ. Gère les migrations EF Core au démarrage.
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: collectorshop-back
  namespace: collectorshop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: collectorshop-back
  template:
    metadata:
      labels:
        app: collectorshop-back
    spec:
      imagePullSecrets:
        - name: ghcr-regcred
      containers:
        - name: collectorshop-back
          image: ghcr.io/kevinfosse/collectorshop-back:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            # Desactive pour laisser Serilog et Kestrel generer
            # leurs fichiers temporaires
            readOnlyRootFilesystem: false
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
            - name: DOTNET_SYSTEM_GLOBALIZATION_INVARIANT
              value: "false"

            # 1. LE CORS (Autorise ton Frontend)
            - name: CorsSettings__AllowedOrigins__0
              value: "https://collectorcube.duckdns.org"

            # 2. DÉCLARATION DU MOT DE PASSE (DOIT RESTER EN HAUT)
            - name: MSSQL_SA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mssql-secret
                  key: sa-password

            # 3. UTILISATION DU MOT DE PASSE (Injection par Kubernetes)
            - name: ConnectionStrings__DefaultConnection
              value: >-
                Server=mssql;Database=CollectorShop;User Id=SA;
                Password=$(MSSQL_SA_PASSWORD);TrustServerCertificate=True;
                MultipleActiveResultSets=true

            # 4. CONFIGURATION RABBITMQ
            - name: RabbitMQ__Host
              value: "rabbitmq"
            - name: RabbitMQ__Username
              value: "collector"
            - name: RabbitMQ__Password
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: password

          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          # -------------------------------------------------------------
          # SONDES (PROBES)
          # -------------------------------------------------------------
          # Startup : Laisse 2m30 (30 essais * 5s) à EF Core pour MigrateAsync()
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            failureThreshold: 30
            periodSeconds: 5

          # Readiness : Vérifie que l'app est prête à recevoir du trafic
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 10

          # Liveness : Redémarre le conteneur s'il est bloqué (Deadlock)
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 20
            failureThreshold: 3

          # -------------------------------------------------------------
          # VOLUMES TEMPORAIRES
          # -------------------------------------------------------------
          volumeMounts:
            - name: logs-dir
              mountPath: /app/logs
            - name: tmp-dir
              mountPath: /tmp

      volumes:
        - name: logs-dir
          emptyDir: {}
        - name: tmp-dir
          emptyDir: {}

---
# Service pour exposer le backend en interne au Frontend / Ingress
apiVersion: v1
kind: Service
metadata:
  name: collectorshop-back
  namespace: collectorshop
spec:
  selector:
    app: collectorshop-back
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
